<!DOCTYPE html>
<html lang="pt-br">
<head>

  <title>Tradução de Frutas</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>Clique em uma fruta para ver a tradução para o inglês</h1>
  <img src="coleta-de-frutas-planas-organicas_23-2148950159.jpg" usemap="#mapaFrutas" alt="Frutas" />

  <map name="mapaFrutas">
    <!-- Laranja -->
    <area shape="circle" coords="110,85,50" href="https://translate.google.com/?sl=pt&tl=en&text=laranja" alt="Laranja" />

    <area shape="circle" coords="360,160,80" href="https://translate.google.com/?sl=pt&tl=en&text=banana" alt="Banana" />

    <area shape="circle" coords="520,100,45" href="https://translate.google.com/?sl=pt&tl=en&text=uva" alt="Uva" />

    <area shape="circle" coords="170,270,70" href="https://translate.google.com/?sl=pt&tl=en&text=maçã" alt="Maçã" />

    <area shape="circle" coords="300,370,40" href="https://translate.google.com/?sl=pt&tl=en&text=morango" alt="Morango" />

    <area shape="circle" coords="500,580,60" href="https://translate.google.com/?sl=pt&tl=en&text=limão" alt="Limão" />

</html>
